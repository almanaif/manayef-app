<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>منايف GO</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" id="manifest-link">
  <meta name="theme-color" content="#FF6B00">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">


  <script>
    // Safety timer to hide loading screen no matter what
    setTimeout(function() {
      var ld = document.getElementById('loading');
      if (ld) ld.style.display = 'none';
    }, 4000);
  </script>

  <script>
    window.loginEmail = function() {
      const email = document.getElementById('li-email').value.trim();
      const pass = document.getElementById('li-pass').value;
      if(!email || !pass) {
        alert('يرجى إدخال البيانات');
        return;
      }
      
      if (email === 'admin@manayef.app' && pass === 'admin224444') {
        window.CU = { email: email, uid: 'admin_hardcoded' };
        window.CUD = { role: 'admin', name: 'المدير العام' };
        
        // إخفاء كل الشاشات وإظهار لوحة الإدارة
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        var adminScreen = document.getElementById('screen-admin');
        if(adminScreen) adminScreen.classList.add('active');
        
        alert('تم تسجيل دخول الإدارة بنجاح');
      } else {
        alert('بيانات الدخول غير صحيحة');
      }
    };
  </script>
</head>
<body>








<!-- ===== LOADING ===== -->
<div id="loading">
  <div class="ld-ic">🛵</div>
  <div class="ld-name">منايف <span>GO</span></div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
  <div class="ld-sub">جاري التحميل...</div>
</div>








<!-- ===== TOAST ===== -->
<div id="toast" class="toast"></div>








<!-- ===== ENTRY SCREEN ===== -->
<div id="screen-entry" class="screen active">
  <div class="auth-logo" style="margin-bottom:36px">
    <div class="auth-logo-ic">🛵</div>
    <h1>منايف <span>GO</span></h1>
    <p>توصيل سريع في المنايف</p>
  </div>
  <div class="role-card">
    <h2>اختر دورك</h2>
    <p>هنوصلك لأفضل متجر ومناديب التوصيل</p>
    <div class="role-grid">
      <div class="role-btn" onclick="showScreen('screen-auth');pickEntryType('customer')">
        <span class="ri">👤</span><strong>عميل</strong><small>اطلب من المتاجر</small>
      </div>
      <div class="role-btn" onclick="showScreen('screen-auth');pickEntryType('driver')">
        <span class="ri">🛵</span><strong>مندوب</strong><small>وصل الطلبات</small>
      </div>
      <div class="role-btn" onclick="showScreen('screen-auth');pickEntryType('merchant')">
        <span class="ri">🏪</span><strong>تاجر</strong><small>بيع منتجاتك</small>
      </div>
      <div class="role-btn" onclick="showScreen('screen-auth');pickEntryType('admin')">
        <span class="ri">⚙️</span><strong>إدارة</strong><small>لوحة التحكم</small>
      </div>
    </div>
  </div>
</div>
