<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>منايف GO</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" id="manifest-link">
  <meta name="theme-color" content="#FF6B00">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>


<!-- ===== LOADING ===== -->
<div id="loading">
  <div class="ld-ic">🛵</div>
  <div class="ld-name">منايف <span>GO</span></div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
  <div class="ld-sub">جاري التحميل...</div>
</div>


<!-- ===== TOAST ===== -->
<div id="toast" class="toast"></div>


<!-- ===== ENTRY SCREEN ===== -->
<div id="screen-entry" class="screen active">
  <div class="auth-logo" style="margin-bottom:36px">
    <div class="auth-logo-ic">🛵</div>
    <h1>منايف <span>GO</span></h1>
    <p>توصيل سريع في المنايف</p>
  </div>
  <div class="role-card">
    <h2>اختر دورك</h2>
    <p>هنوصلك لأفضل متجر ومناديب التوصيل</p>
    <div class="role-grid">
      <div class="role-btn" onclick="showScreen('screen-auth');pickEntryType('customer')">
        <span class="ri">👤</span><strong>عميل</strong><small>اطلب من المتاجر</small>
      </div>
      <div class="role-btn" onclick="showScreen('screen-auth');pickEntryType('driver')">
        <span class="ri">🛵</span><strong>مندوب</strong><small>وصل الطلبات</small>
      </div>
      <div class="role-btn" onclick="showScreen('screen-auth');pickEntryType('merchant')">
        <span class="ri">🏪</span><strong>تاجر</strong><small>بيع منتجاتك</small>
      </div>
      <div class="role-btn" onclick="showScreen('screen-auth');pickEntryType('admin')">
        <span class="ri">⚙️</span><strong>إدارة</strong><small>لوحة التحكم</small>
      </div>
    </div>
  </div>
</div>


<!-- ===== AUTH SCREEN ===== -->
<div id="screen-auth" class="screen">
  <div class="auth-logo">
    <div class="auth-logo-ic">🛵</div>
    <h1>منايف <span>GO</span></h1>
    <p id="entry-type-label">حساب جديد</p>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">تسجيل دخول</button>
      <button class="auth-tab" onclick="switchTab('register')">حساب جديد</button>
    </div>
    <div id="err-msg" class="err-msg"></div>


    <!-- LOGIN -->
    <div id="auth-login">
      <button class="google-btn" onclick="loginGoogle()">
